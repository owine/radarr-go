---
# Optimized golangci-lint configuration
# Focuses on critical linters for fast, accurate code quality checks

version: "2"

run:
  timeout: 5m
  go: "1.25"
  concurrency: 4
  build-tags:
    - integration

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - whitespace
    - revive

  disable:
    - bodyclose
    - dupl
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - lll
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - unconvert
    - unparam

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    gosec:
      severity: high
      confidence: medium

    govet:
      enable:
        - atomic
        - bools
        - copylocks
        - printf
        - shadow
        - shift
        - unreachable

    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: package-comments
          disabled: true

  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: ".*\\.pb\\.go$"
        linters:
          - all
      - path: ".*_test\\.go$"
        linters:
          - errcheck
          - gosec
      - text: "var-naming: avoid meaningless package names"
        linters:
          - revive
    paths:
      - vendor
      - node_modules
      - web
      - tmp
      - third_party
      - ".*\\.pb\\.go$"

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true
  show-stats: false
  sort-order:
    - file
